{% extends 'base.html' %}
{% block content %}

<style>
body {
    background: #f4f6f9;
    font-family: 'Segoe UI', sans-serif;
}

/* CENTER BOX */
.center-box {
    max-width: 520px;
    margin: 60px auto;
}

/* CARD */
.card-custom {
    background: white;
    border-radius: 18px;
    padding: 30px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.08);
}

/* TITLE */
.title-red {
    color: #c0392b;
    font-weight: bold;
    text-align: center;
    margin-bottom: 25px;
}

/* LABEL */
label {
    font-weight: 600;
    margin-bottom: 5px;
    display: block;
}

/* INPUT */
.form-control {
    width: 100%;
    border-radius: 10px;
    padding: 10px;
    border: 1px solid #ddd;
    transition: 0.3s;
}

.form-control:focus {
    border-color: #e74c3c;
    box-shadow: 0 0 8px rgba(231, 76, 60, 0.3);
    outline: none;
}

/* BUTTON */
.btn-red {
    background: linear-gradient(45deg, #c0392b, #e74c3c);
    border: none;
    color: white;
    padding: 12px;
    border-radius: 12px;
    width: 100%;
    margin-top: 10px;
    font-weight: bold;
    transition: 0.3s;
}

.btn-red:hover {
    background: linear-gradient(45deg, #a93226, #cb4335);
    transform: scale(1.03);
}

/* ICON HEADER */
.icon-top {
    text-align: center;
    font-size: 40px;
    margin-bottom: 10px;
}
</style>

<div class="center-box">
    <div class="card-custom">

    <div class="icon-top">🚨</div>
    <h3 class="title-red">Nouvelle demande urgente</h3>

    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label>Groupe sanguin</label>
            {{ form.groupe_sanguin }}
        </div>

        <div class="mb-3">
            <label>Quantité (poches)</label>
            {{ form.quantite }}
        </div>

        <div class="mb-3">
            <label>Délai</label>
            {{ form.delai }}
        </div>

        <div class="mb-3">
            <label>Description</label>
            {{ form.description }}
        </div>

        <div class="mb-3">
            <label>Hôpital</label>
            {{ form.hopital }}
        </div>

        <button type="submit" class="btn-red">
            🚀 Créer la demande
        </button>

    </form>

</div>


</div>

{% endblock %}
