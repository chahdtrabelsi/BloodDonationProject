{% extends 'base.html' %}


{%block styles%}
<style>
body {
    background: #f4f6f9;
    font-family: Arial;
}

/* Card principale */
.modifier-card {
    max-width: 600px;
    margin: 40px auto;
    background: white;
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.1);
    border-top: 5px solid #c0392b;
}

/* Titre */
.modifier-card h2 {
    text-align: center;
    color: #c0392b;
    margin-bottom: 20px;
}

/* Labels */
.modifier-card label {
    font-weight: bold;
    color: #333;
}

/* Inputs */
.modifier-card input,
.modifier-card select,
.modifier-card textarea {
    width: 100%;
    padding: 10px;
    margin-bottom: 15px;
    border-radius: 8px;
    border: 1px solid #ddd;
    transition: 0.3s;
}

.modifier-card input:focus,
.modifier-card select:focus,
.modifier-card textarea:focus {
    border-color: #c0392b;
    outline: none;
    box-shadow: 0 0 5px rgba(192,57,43,0.3);
}

/* Boutons */
.btn-red {
    background: #c0392b;
    color: white;
    padding: 10px 18px;
    border: none;
    border-radius: 8px;
    width: 100%;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.btn-red:hover {
    background: #a93226;
}

/* retour */
.btn-back {
    display: inline-block;
    margin-top: 15px;
    text-align: center;
    width: 100%;
    color: #555;
    text-decoration: none;
}

.btn-back:hover {
    color: #c0392b;
}
</style>
{%endblock%}
{% block content %}
<div class="modifier-card">

    <h2>✏️ Modifier la demande urgente</h2>

    <form method="POST">
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit" class="btn-red">
            💾 Enregistrer les modifications
        </button>
    </form>

    <a href="{% url 'demandes:liste_demandes' %}" class="btn-back">
        ⬅ Retour à la liste
    </a>

</div>

{% endblock %}
