{% extends 'base.html' %}
{% block content %}

<style>
.auth-wrapper{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:90vh;
}

.auth-card{
    background:#fff;
    padding:30px;
    border-radius:15px;
    width:100%;
    max-width:520px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.auth-title{
    text-align:center;
    color:#c0392b;
    margin-bottom:20px;
    font-weight:bold;
}

.form-group{
    margin-bottom:10px;
}

label{
    font-weight:500;
}

.btn-red{
    background:linear-gradient(180deg,#c0392b,#e74c3c);
    color:white;
    border:none;
    width:100%;
    padding:10px;
    border-radius:30px;
}
</style>

<div class="auth-wrapper">

    <div class="auth-card">

        <h2 class="auth-title">🩸 Inscription Donneur</h2>

        <form method="post">
            {% csrf_token %}

            <div class="form-group">
                <label>Groupe sanguin</label>
                {{ form.groupe_sanguin }}
            </div>

            <div class="form-group">
                <label>Sexe</label>
                {{ form.sexe }}
            </div>

            <div class="form-group">
                <label>Date naissance</label>
                {{ form.date_naissance }}
            </div>

            <div class="form-group">
                <label>Ville</label>
                {{ form.ville }}
            </div>

            <hr>

            <div class="form-group">
                <label>Username</label>
                {{ form.username }}
            </div>

            <div class="form-group">
                <label>Email</label>
                {{ form.email }}
            </div>

            <div class="form-group">
                <label>Password</label>
                {{ form.password }}
            </div>

            <button class="btn-red mt-2">
                Continuer
            </button>

        </form>

    </div>

</div>

{% endblock %}
