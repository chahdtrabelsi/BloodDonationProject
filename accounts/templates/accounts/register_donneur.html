{% extends 'base.html' %}

{% block content %}
<div class="container mt-5 col-md-6">

    <div class="card shadow p-4">

        <h3 class="text-center mb-4">🩸 Inscription Donneur</h3>

        <!-- Errors -->
        {% if form.errors %}
            <div class="alert alert-danger">
                {{ form.errors }}
            </div>
        {% endif %}

        <form method="post" novalidate>
            {% csrf_token %}

            <!-- Groupe sanguin -->
            <div class="mb-3">
                <label class="form-label">Groupe sanguin</label>
                {{ form.groupe_sanguin }}
            </div>

            <!-- Sexe -->
            <div class="mb-3">
                <label class="form-label">Sexe</label>
                {{ form.sexe }}
            </div>

            <!-- Date naissance -->
            <div class="mb-3">
                <label class="form-label">Date de naissance</label>
                {{ form.date_naissance }}
            </div>

            <!-- Ville -->
            <div class="mb-3">
                <label class="form-label">Ville</label>
                {{ form.ville }}
            </div>

            <!-- Username -->
            <div class="mb-3">
                <label class="form-label">Username</label>
                {{ form.username }}
            </div>

            <!-- Email -->
            <div class="mb-3">
                <label class="form-label">Email</label>
                {{ form.email }}
            </div>

            <!-- Password -->
            <div class="mb-3">
                <label class="form-label">Password</label>
                {{ form.password }}
            </div>

            <button type="submit" class="btn btn-danger w-100">
                S'inscrire
            </button>

        </form>

    </div>

</div>
{% endblock %}
