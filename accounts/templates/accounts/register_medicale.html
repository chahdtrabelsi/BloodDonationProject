<style>
.auth-wrapper{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:90vh;
}

.auth-card{
    background:#fff;
    padding:30px;
    border-radius:15px;
    width:100%;
    max-width:520px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.auth-title{
    text-align:center;
    color:#c0392b;
    margin-bottom:20px;
    font-weight:bold;
}

/* form inputs */
.auth-card input[type="number"],
.auth-card input[type="text"],
.auth-card select{
    width:100%;
    padding:10px;
    border:1px solid #ddd;
    border-radius:8px;
    margin-top:5px;
    margin-bottom:15px;
}

/* checkboxes */
.form-check{
    display:flex;
    align-items:center;
    gap:10px;
    margin:10px 0;
    font-size:15px;
}

/* button */
.btn-red{
    background:linear-gradient(180deg,#c0392b,#e74c3c);
    color:white;
    border:none;
    width:100%;
    padding:12px;
    border-radius:30px;
    font-weight:bold;
    margin-top:15px;
    cursor:pointer;
    transition:0.3s;
}

.btn-red:hover{
    opacity:0.9;
}
</style>

<div class="auth-wrapper">

    <div class="auth-card">

        <h2 class="auth-title">📄 Dossier médical</h2>

        <form method="post">
            {% csrf_token %}

            <label>Poids (kg)</label>
            {{ form.poids }}

            <div class="form-check">
                {{ form.a_tension }} <label>Tension artérielle</label>
            </div>

            <div class="form-check">
                {{ form.diabete }} <label>Diabète</label>
            </div>

            <div class="form-check">
                {{ form.anemie }} <label>Anémie</label>
            </div>

            <div class="form-check">
                {{ form.maladie_sanguine }} <label>Maladie sanguine</label>
            </div>

            <button type="submit" class="btn-red">
                Enregistrer
            </button>

        </form>

    </div>

</div>
